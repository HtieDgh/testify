[routes]
; Главная страница
GET /                                  = controller\BHttp->notesPage

; Авторизация
GET|POST /login                        = controller\SHttp->loginPage
GET      /login/@msg                   = controller\SHttp->loginPage
GET      /regist                       = controller\SHttp->registPage
GET      /exit                         = controller\SHttp->exitPage

; Профили
GET      /profile                      = controller\SHttp->profilePage
GET      /profile/@msg                 = controller\SHttp->profilePage
GET      /profile/notes                = controller\SHttp->profileNotesPage
GET      /profile/notes/@msg           = controller\SHttp->profileNotesPage
GET      /profile/statistics           = controller\SHttp->profileStatisticsPage
GET      /profile/courses              = controller\SHttp->profileCoursesPage
GET      /profile/courses/my           = controller\SHttp->profileMyCoursesPage
GET      /profile/subscribes/@all      = controller\SHttp->profileSubscribersPage
GET      /profile/tests                = controller\SHttp->profileTestsPage
GET      /profile/tests/@all           = controller\SHttp->profileMyTestsPage
GET      /profile/become_author        = controller\SHttp->becomeAuthor
GET      /profile/courses/requests/@id = controller\SHttp->profileRequestsPage
GET      /profile/courses/subscribes/@id = controller\SHttp->profileCourseSubscribersPage

; форма обратной связи
GET|POST /email                        = controller\BHttp->emailPage

; Редакторы
; @ed_type = new | change, @id = [0-9]+, иначе - ошибка передачи параметров
GET|POST /editor/note/@ed_type/@id       = controller\BHttp->noteEditorPage
GET|POST /editor/course/@ed_type/@id     = controller\BHttp->courseEditorPage
GET|POST /editor/accounts/@ed_type/@id   = controller\SHttp->accountsEditorPage
GET|POST /editor/profile                 = controller\SHttp->profileEditPage
GET|POST /editor/files                   = controller\BHttp->filesEditorPage
GET      /editor/files/@msg              = controller\BHttp->filesEditorPage
GET      /editor/test/@variant_link      = controller\THttp->testEditorPage
GET      /editor/questions/@variant_link = controller\THttp->questionsEditorPage
GET      /editor/test/id/@test_id        = controller\THttp->editorPage
; Загрузка резервной копии теста
POST     /test/restore                   = controller\THttp->uploadBackup

; Плеер теста
GET      /test/@variant_link             = controller\THttp->testPage
GET      /check/@variant_link            = controller\THttp->checkResultPage
GET      /test/statistics/@test_id       = controller\THttp->statisticsPage
GET      /test/statistics/@test_id/@variant_link = controller\THttp->statisticsPage

; AJAX запросы
; @file_type = img|file|video
GET /all/@file_type/@user_id  [ajax]      = controller\XHttp->getAllFiles
GET /delete/test/@test_id [ajax]          = controller\XHttp->deleteTest
GET /delete/variant/@variant_link [ajax]  = controller\XHttp->deleteVariant
GET /variants/link/@test_id [ajax]        = controller\XHttp->getVariantsLinks
GET /editor/files/ext [ajax] = controller\XHttp->getFilesExtList

GET /comments/@note_id [ajax]             = controller\XHttp->getComments
POST /comments/@note_id [ajax]            = controller\XHttp->newComment
DELETE /comments/@comment_id [ajax]       = controller\XHttp->deleteComment

DELETE /file [ajax] = controller\XHttp->deleteFile
DELETE /note/@id [ajax]                   = controller\XHttp->deleteNote
DELETE /course/@id [ajax]                 = controller\XHttp->deleteCourse
DELETE /user/@id [ajax]                   = controller\XHttp->deleteUser

POST /profile/edit/ava [ajax]             = controller\XHttp->saveAva
POST /course/edit/ava [ajax]              = controller\XHttp->saveCourseAva
POST /request/confirm/@course_id/@subscriber_id [ajax] = controller\XHttp->confirmRequest
POST /request/cancel/@course_id/@subscriber_id [ajax] = controller\XHttp->unsubscribeToCourse

POST /author/subscribe/@subscriber_id/@id [ajax]   = controller\XHttp->subscribeToAuthor
POST /author/unsubscribe/@subscriber_id/@id [ajax] = controller\XHttp->unsubscribeToAuthor
POST /course/subscribe/@subscriber_id/@course_id [ajax] = controller\XHttp->subscribeToCourse
POST /course/unsubscribe/@subscriber_id/@course_id [ajax] = controller\XHttp->unsubscribeToCourse

POST /regist/new [ajax]                   = controller\XHttp->newUser
POST /send/test/file/@variant_link [ajax] = controller\XHttp->saveTestFiles
POST /edit/test/@variant_link [ajax]      = controller\XHttp->editTest
POST /edit/questions/@variant_link [ajax] = controller\XHttp->editQuestions
POST /new/result/@variant_link [ajax]     = controller\XHttp->newResult
