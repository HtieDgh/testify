[routes]
GET /=HttpController->mainPage
GET /@err_txt = HttpController->mainPage
GET /regist = HttpController->registPage
GET /exit = HttpController->exitPage
GET /edit/test/@variant_link = HttpController->editorTestPage
GET /edit/questions/@variant_link = HttpController->editorQuestionsPage
GET /editor/@test_id = HttpController->editorPage
GET /test/@variant_link = HttpController->testPage
GET /check/@variant_link = HttpController->checkResultPage
GET /statistics/@test_id = HttpController->statisticsPage

GET /delete/test/@test_id [ajax] = XHttpController->deleteTest
GET /delete/variant/@variant_link [ajax] = XHttpController->deleteVariant
GET /variantslink/@test_id [ajax] = XHttpController->getVariantsLinks

POST /=HttpController->mainPage
POST /regist/new [ajax] = XHttpController->newUser
POST /send/test/file/@variant_link [ajax] = XHttpController->saveTestFiles
POST /edit/test/@variant_link [ajax] = XHttpController->editTest
POST /edit/questions/@variant_link [ajax] = XHttpController->editQuestions
POST /new/result/@variant_link [ajax] = XHttpController->newResult
